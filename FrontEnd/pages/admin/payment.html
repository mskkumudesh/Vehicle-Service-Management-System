<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f7fa; }
        .card { border-radius: 15px; }
    </style>
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Payment Management</h2>

    <!-- FORM -->
    <div class="card p-4 shadow mb-4">
        <h5>Payment Details</h5>

        <form id="paymentForm">

            <input type="hidden" id="paymentId">

            <div class="row g-3">

                <div class="col-md-3">
                    <input type="date" id="paymentDate" class="form-control" required>
                </div>

                <div class="col-md-3">
                    <input type="text" id="paymentMethod" class="form-control" placeholder="Payment Method" required>
                </div>

                <div class="col-md-3">
                    <input type="number" id="amount" class="form-control" placeholder="Amount" required>
                </div>

                <!-- 🔥 Booking Dropdown -->
                <div class="col-md-3">
                    <select id="bookingId" class="form-control" required>
                        <option value="">Select Booking</option>
                    </select>
                </div>

            </div>

            <div class="mt-3">
                <button type="button" class="btn btn-warning" onclick="updatePayment()">Update</button>
                <button type="reset" class="btn btn-secondary">Clear</button>
            </div>

        </form>
    </div>

    <!-- TABLE -->
    <div class="card p-4 shadow">
        <h5>Payment List</h5>

        <table class="table table-striped mt-3">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Method</th>
                <th>Amount</th>
                <th>Booking</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody id="paymentTable"></tbody>
        </table>

        <h5 class="mt-3">Total Amount: <span id="totalAmount">0</span></h5>

    </div>

</div>

<script>

    const BASE_URL = "http://localhost:8080/api/v1/payment";
    const BOOKING_URL = "http://localhost:8080/api/v1/booking";

    window.onload = () => {
        loadPayments();
        loadBookings();
    };


    // ================= RESPONSE HANDLER =================
    async function handleResponse(res) {
        const text = await res.text();
        if (!res.ok) throw new Error(text);

        try {
            return JSON.parse(text);
        } catch {
            return text;
        }
    }


    // ================= LOAD BOOKINGS (Dropdown) =================
    function loadBookings() {
        fetch(BOOKING_URL + "/getAll")
            .then(handleResponse)
            .then(data => {

                const select = document.getElementById("bookingId");
                select.innerHTML = '<option value="">Select Booking</option>';

                data.data.forEach(b => {
                    select.innerHTML += `
                    <option value="${b.bookingId}">
                         ${b.vehicleNumber} (${b.bookingDate})
                    </option>
                `;
                });

            })
            .catch(err => alert("Error loading bookings: " + err.message));
    }


    // ================= LOAD PAYMENTS =================
    function loadPayments() {
        fetch(BASE_URL + "/getAll")
            .then(handleResponse)
            .then(data => {

                const table = document.getElementById("paymentTable");
                table.innerHTML = "";

                let total = 0;

                data.data.forEach(p => {

                    total += p.amount;

                    table.innerHTML += `
                <tr onclick="selectPayment('${p.paymentId}','${p.paymentDate}','${p.paymentMethod}','${p.amount}','${p.bookingId}')">
                    <td>${p.paymentId}</td>
                    <td>${p.paymentDate}</td>
                    <td>${p.paymentMethod}</td>
                    <td>${p.amount}</td>
                    <td>${p.bookingId}</td>
                    <td>
                        <button class="btn btn-sm btn-danger"
                            onclick="event.stopPropagation(); deletePayment('${p.paymentId}')">
                            Delete
                        </button>
                    </td>
                </tr>
                `;
                });

                document.getElementById("totalAmount").innerText = total;

            })
            .catch(err => alert("Error loading payments: " + err.message));
    }


    // ================= SELECT =================
    function selectPayment(id, date, method, amount, bookingId) {

        document.getElementById("paymentId").value = id;
        document.getElementById("paymentDate").value = date.split("T")[0];
        document.getElementById("paymentMethod").value = method;
        document.getElementById("amount").value = amount;
        document.getElementById("bookingId").value = bookingId;
    }


    // ================= SAVE =================
    document.getElementById("paymentForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const payment = {
            paymentDate: document.getElementById("paymentDate").value,
            paymentMethod: document.getElementById("paymentMethod").value,
            amount: parseFloat(document.getElementById("amount").value),
            bookingId: parseInt(document.getElementById("bookingId").value)
        };

        fetch(BASE_URL + "/save", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payment)
        })
            .then(handleResponse)
            .then(() => {
                alert("Payment saved!");
                loadPayments();
                document.getElementById("paymentForm").reset();
            })
            .catch(err => alert("Error saving: " + err.message));
    });


    // ================= UPDATE =================
    function updatePayment() {

        const payment = {
            paymentId: parseInt(document.getElementById("paymentId").value),
            paymentDate: document.getElementById("paymentDate").value,
            paymentMethod: document.getElementById("paymentMethod").value,
            amount: parseFloat(document.getElementById("amount").value),
            bookingId: parseInt(document.getElementById("bookingId").value)
        };

        fetch(BASE_URL + "/update", {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payment)
        })
            .then(handleResponse)
            .then(() => {
                alert("Payment updated!");
                loadPayments();
                document.getElementById("paymentForm").reset();
            })
            .catch(err => alert("Error updating: " + err.message));
    }


    // ================= DELETE =================
    function deletePayment(id) {

        if (!confirm("Are you sure?")) return;

        fetch(BASE_URL + "/delete/" + id, {
            method: "DELETE"
        })
            .then(handleResponse)
            .then(() => {
                alert("Deleted!");
                loadPayments();
            })
            .catch(err => alert("Error deleting: " + err.message));
    }

</script>

</body>
</html>
