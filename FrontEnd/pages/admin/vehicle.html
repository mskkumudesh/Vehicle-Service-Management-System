<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            border-radius: 15px;
        }
        .btn {
            border-radius: 10px;
        }
        .table {
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="card p-4 shadow">
        <h3 class="text-center mb-4">🚗 Vehicle Management</h3>

        <!-- FORM -->
        <form id="vehicleForm">
            <input type="hidden" id="vehicleId">

            <div class="row mb-3">
                <div class="col">
                    <input type="text" id="vehicleNumber" class="form-control" placeholder="Vehicle Number" required>
                </div>
                <div class="col">
                    <input type="text" id="category" class="form-control" placeholder="Category" required>
                </div>
                <div class="col">
                    <input type="text" id="brand" class="form-control" placeholder="Brand" required>
                </div>
                <div class="col">
                    <input type="number" id="userId" class="form-control" placeholder="User ID" required>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary">Save Vehicle</button>
                <button type="button" class="btn btn-warning" onclick="updateVehicle()">Update</button>
                <button type="button" class="btn btn-danger" onclick="deleteVehicle()">Delete</button>
                <button type="reset" class="btn btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
    </div>

    <!-- TABLE -->
    <div class="card mt-4 p-4 shadow">
        <h5>Vehicle List</h5>

        <table class="table table-striped mt-3">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Number</th>
                <th>Category</th>
                <th>Brand</th>
                <th>User ID</th>
            </tr>
            </thead>
            <tbody id="vehicleTable"></tbody>
        </table>
    </div>

</div>

<script>
    const BASE_URL = "http://localhost:8080/api/v1/vehicle";

    function loadVehicles() {
        fetch(BASE_URL + "/getAll",{
            method:"GET",
            headers:{
              //  "Authorization": "Bearer " + localStorage.getItem("token")
            }})
            .then(res => res.json())
            .then(data => {
                const table = document.getElementById("vehicleTable");
                table.innerHTML = "";

                data.data.forEach(vehicle => {
                    let row = `
                        <tr onclick="selectVehicle('${vehicle.vehicleId}','${vehicle.vehicleNumber}','${vehicle.category}','${vehicle.brand}','${vehicle.userId}')">
                            <td>${vehicle.vehicleId}</td>
                            <td>${vehicle.vehicleNumber}</td>
                            <td>${vehicle.category}</td>
                            <td>${vehicle.brand}</td>
                            <td>${vehicle.userId}</td>
                        </tr>
                    `;
                    table.innerHTML += row;
                });
            })
            .catch(err => console.error("Error loading vehicles:", err));
    }

    // SAVE VEHICLE
    document.getElementById("vehicleForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const vehicle = {
            vehicleId: document.getElementById("vehicleId").value,
            vehicleNumber: document.getElementById("vehicleNumber").value,
            vehicleType: document.getElementById("category").value,
            brand: document.getElementById("brand").value,
            userId: document.getElementById("userId").value
        };

        fetch(BASE_URL + "/save", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(vehicle)
        })
            .then(res => res.json())
            .then(() => {
                alert("Vehicle Saved!");
                loadVehicles();
                clearForm();
            })
            .catch(err => {alert(err.message)});
    });

    // SELECT VEHICLE
    function selectVehicle(id, number, category, brand, userId) {
        document.getElementById("vehicleId").value = id;
        document.getElementById("vehicleNumber").value = number;
        document.getElementById("category").value = category;
        document.getElementById("brand").value = brand;
        document.getElementById("userId").value = userId;
    }

    // UPDATE VEHICLE
    function updateVehicle() {
        const vehicle = {
            vehicleId: document.getElementById("vehicleId").value,
            vehicleNumber: document.getElementById("vehicleNumber").value,
            category: document.getElementById("category").value,
            brand: document.getElementById("brand").value,
            userId: document.getElementById("userId").value
        };

        fetch(BASE_URL + "/update", {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(vehicle)
        })
            .then(res => res.json())
            .then(() => {
                alert("Vehicle Updated!");
                loadVehicles();
                clearForm();
            });
    }

    // DELETE VEHICLE
    function deleteVehicle() {
        const id = document.getElementById("vehicleId").value;

        fetch(BASE_URL + "/delete/" + id, {
            method: "DELETE"
        })
            .then(() => {
                alert("Vehicle Deleted!");
                loadVehicles();
                clearForm();
            });
    }

    // CLEAR FORM
    function clearForm() {
        document.getElementById("vehicleForm").reset();
        document.getElementById("vehicleId").value = "";
    }

    // INITIAL LOAD
    loadVehicles();
</script>

</body>
</html>
