<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            border-radius: 12px;
        }
        .table th {
            background-color: #0d6efd;
            color: white;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <!-- ADD SERVICE -->
    <div class="card shadow p-4 mb-4">
        <h4 class="mb-3">Add Service</h4>

        <form id="serviceForm">
            <div class="row">

                <div class="col-md-4 mb-3">
                    <input type="text" id="serviceName" class="form-control" placeholder="Service Name" required>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="number" id="price" class="form-control" placeholder="Price" required>
                </div>

                <div class="col-md-4 mb-3">
                    <button type="submit" class="btn btn-success w-100">Save Service</button>
                </div>

            </div>
        </form>
    </div>

    <!-- SERVICE TABLE -->
    <div class="card shadow p-4">
        <h3 class="mb-4 text-center">🛠️ Services</h3>

        <table class="table table-bordered text-center">
            <thead>
            <tr>
                <th>ID</th>
                <th>Service Name</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="serviceTable"></tbody>
        </table>
    </div>

</div>

<script>

    const BASE_URL = "http://localhost:8080/api/v1/service";
    const token = localStorage.getItem("token");

    function loadServices() {
        fetch(BASE_URL + "/getAll", {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token
            }
        })
            .then(res => res.json())
            .then(data => {
                const table = document.getElementById("serviceTable");
                table.innerHTML = "";

                data.data.forEach(s => {
                    let row = `
                    <tr>
                        <td>${s.serviceId}</td>
                        <td>${s.serviceName}</td>
                        <td>${s.price}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteService(${s.serviceId})">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
                    table.innerHTML += row;
                });
            });
    }

    // SAVE SERVICE
    document.getElementById("serviceForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const service = {
            serviceName: document.getElementById("serviceName").value,
            price: document.getElementById("price").value
        };

        fetch(BASE_URL + "/save", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(service)
        })
            .then(() => {
                alert("✅ Service Added");
                document.getElementById("serviceForm").reset();
                loadServices();
            })
            .catch(() => {
                alert("❌ Failed to add service");
            });
    });

    // DELETE SERVICE
    function deleteService(id) {
        if (!confirm("Are you sure?")) return;

        fetch(BASE_URL + "/delete/" + id, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        })
            .then(() => {
                alert("🗑️ Service Deleted");
                loadServices();
            });
    }

    // INIT
    loadServices();

</script>

</body>
</html>
