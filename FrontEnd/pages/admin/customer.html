<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Management</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            border-radius: 15px;
        }
        .table {
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Customer Management</h2>

    <!-- Form -->
    <div class="card p-4 shadow mb-4">
        <h5>Customer Details</h5>
        <form id="customerForm">
            <input type="hidden" id="userId">
            <div class="row">
                <div class="col-md-3">
                    <input type="text" id="name" class="form-control" placeholder="Full name">
                </div>
                <div class="col-md-3">
                    <input type="text" id="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="col-md-3">
                    <input type="text" id="username" class="form-control" placeholder="Username" required>
                </div>
                <div class="col-md-3">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                </div>
                <div class="col-md-3">
                    <select id="role" class="form-control">
                        <option value="Admin">Admin</option>
                        <option value="Customer">Customer</option>
                    </select>
                </div>
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="reset" class="btn btn-secondary">Clear</button>
            </div>
        </form>
    </div>

    <!-- Table -->
    <div class="card p-4 shadow">
        <h5>Customer List</h5>
        <table class="table table-striped mt-3">
            <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Username</th>
                <th>Password</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="customerTable">
            </tbody>
        </table>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

    const BASE_URL = "http://localhost:8080/api/v1/user";

    // Load customers when page loads
    window.onload = function () {
        loadCustomers();
    };


    function loadCustomers() {
        fetch(BASE_URL + "/getAll", {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
           //     "Authorization": "Bearer " + localStorage.getItem("token")
            }
        })
            .then(res => {
                if (!res.ok) {
                    throw new Error("HTTP error! Status: " + res.status);
                }
                return res.json();
            })
            .then(data => {
                const table = document.getElementById("customerTable");
                table.innerHTML = "";

                data.data.forEach(c => {
                    table.innerHTML += `
    <tr>
        <td>${c.name}</td>
        <td>${c.email}</td>
        <td>${c.username}</td>
        <td>*********</td>
        <td>${c.role}</td>
        <td>
            <button class="btn btn-sm btn-info"
                onclick="selectCustomer('${c.name}','${c.email}','${c.username}','${c.password}','${c.role}')">Edit</button>
            <button class="btn btn-sm btn-danger"
                onclick="deleteCustomer('${c.email}')">Delete</button>
        </td>
    </tr>
    `;
                });
            })
            .catch(err => {
                console.error("Error loading customers:", err);
                alert("Failed to load customers: " + err.message);
            });
    }

    // 🔹 SAVE CUSTOMER
    document.getElementById("customerForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const customer = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value
        };

        fetch(BASE_URL+"/save", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(customer)
        })
            .then(res => {
                if (!res.ok) throw res;
                return res.json();
            })
            .then(() => {
                alert("Customer updated successfully!");
                loadCustomers();
                document.getElementById("customerForm").reset();
            })
            .catch( err => {
                alert("Error: " + err.message);
            });
    });


    function selectCustomer(name, email,username,password,role) {
        document.getElementById("name").value = name;
        document.getElementById("email").value = email;
        document.getElementById("username").value = username;
        document.getElementById("role").value = role;
        document.getElementById("password").value = password;

    }


    function updateCustomer() {
        const id = document.getElementById("id").value;

        const customer = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            address: document.getElementById("address").value
        };

        fetch(`${BASE_URL}/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(customer)
        })
            .then(res => {
                if (!res.ok) throw res;
                return res.json();
            })
            .then(() => {
                alert("Customer Updated!");
                loadCustomers();
                document.getElementById("customerForm").reset();
            })
            .catch(async err => {
                const error = await err.json();
                alert("Error: " + JSON.stringify(error));
            });
    }

    // 🔹 DELETE CUSTOMER
    function deleteCustomer(email) {
        if (!confirm("Are you sure?")) return;

        fetch(`${BASE_URL}/delete/${email}`, {
            method: "DELETE"
        })
            .then(res => {
                if (!res.ok) throw res;
                alert("Deleted!");
                loadCustomers();
            })
            .catch(async err => {
                const error = await err.json();
                alert("Error: " + JSON.stringify(error));
            });
    }

</script>



</body>
</html>
