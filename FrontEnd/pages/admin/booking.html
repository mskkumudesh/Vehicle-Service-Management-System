<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            border-radius: 15px;
        }
        .table {
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Booking Management</h2>

    <!-- FORM -->
    <div class="card p-4 shadow mb-4">
        <h5>Booking Details</h5>

        <form id="bookingForm">
            <input type="hidden" id="bookingId">

            <div class="row g-3">

                <div class="col-md-3">
                    <input type="number" id="vehicleId" class="form-control" placeholder="Vehicle ID" required>
                </div>

                <div class="col-md-3">
                    <input type="text" id="vehicleNumber" class="form-control" placeholder="Vehicle Number" required>
                </div>

                <div class="col-md-3">
                    <input type="date" id="bookingDate" class="form-control" required>
                </div>

                <div class="col-md-3">
                    <input type="time" id="bookingTime" class="form-control" required>
                </div>

                <div class="col-md-3">
                    <select id="status" class="form-control">
                        <option value="Pending">PENDING</option>
                        <option value="Confirmed">CONFIRMED</option>
                        <option value="Completed">COMPLETED</option>
                        <option value="Cancelled">CANCELLED</option>
                    </select>
                </div>

            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" class="btn btn-warning" onclick="updateBooking()">Update</button>
                <button type="reset" class="btn btn-secondary">Clear</button>
            </div>
        </form>
    </div>

    <!-- TABLE -->
    <div class="card p-4 shadow">
        <h5>Booking List</h5>

        <table class="table table-striped mt-3">
            <thead class="table-dark">
            <tr>
                <th>Vehicle ID</th>
                <th>Vehicle Number</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody id="bookingTable"></tbody>
        </table>
    </div>

</div>

<script>

    const BASE_URL = "http://localhost:8080/api/v1/booking";

    window.onload = () => loadBookings();


    // ================= COMMON ERROR HANDLER =================
    async function handleResponse(res) {
        const text = await res.text();

        if (!res.ok) {
            throw new Error(text);
        }

        // Try parse JSON only if needed
        try {
            return JSON.parse(text);
        } catch {
            return text;
        }
    }

    // ================= LOAD BOOKINGS =================
    function loadBookings() {
        fetch(BASE_URL + "/getAll")
            .then(handleResponse)
            .then(data => {

                const table = document.getElementById("bookingTable");
                table.innerHTML = "";

                data.data.forEach(b => {
                    table.innerHTML += `
                <tr>
                    <td>${b.vehicleId}</td>
                    <td>${b.vehicleNumber}</td>
                    <td>${b.bookingDate}</td>
                    <td>${b.bookingTime}</td>
                    <td>${b.status}</td>
                    <td>
                        <button class="btn btn-sm btn-info"
                            onclick="selectBooking('${b.vehicleId}','${b.vehicleNumber}','${b.bookingDate}','${b.bookingTime}','${b.status}')">
                            Edit
                        </button>

                        <button class="btn btn-sm btn-danger"
                            onclick="deleteBooking('${b.vehicleId}')">
                            Delete
                        </button>
                    </td>
                </tr>
                `;
                });

            })
            .catch(err => alert("Error loading bookings: " + err.message));
    }


    // ================= SAVE =================
    document.getElementById("bookingForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const booking = {
            vehicleId: parseInt(document.getElementById("vehicleId").value),
            vehicleNumber: document.getElementById("vehicleNumber").value,
            bookingDate: document.getElementById("bookingDate").value,
            bookingTime: document.getElementById("bookingTime").value,
            status: document.getElementById("status").value
        };

        fetch(BASE_URL + "/save", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(booking)
        })
            .then(handleResponse)
            .then(() => {
                alert("Booking saved!");
                loadBookings();
                document.getElementById("bookingForm").reset();
            })
            .catch(err => alert("Error saving booking: " + err.message));
    });


    // ================= SELECT =================
    function selectBooking(vehicleId, vehicleNumber, date, time, status) {
        document.getElementById("vehicleId").value = vehicleId;
        document.getElementById("vehicleNumber").value = vehicleNumber;
        document.getElementById("bookingDate").value = date;
        document.getElementById("bookingTime").value = time;
        document.getElementById("status").value = status;
    }


    // ================= UPDATE =================
    function updateBooking() {

        const booking = {
            vehicleId: parseInt(document.getElementById("vehicleId").value),
            vehicleNumber: document.getElementById("vehicleNumber").value,
            bookingDate: document.getElementById("bookingDate").value,
            bookingTime: document.getElementById("bookingTime").value,
            status: document.getElementById("status").value,
            serviceDTOS: []
        };

        fetch(BASE_URL + "/update", {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(booking)
        })
            .then(handleResponse)
            .then(() => {
                alert("Booking updated!");
                loadBookings();
                document.getElementById("bookingForm").reset();
            })
            .catch(err => alert("Error updating booking: " + err.message));
    }


    // ================= DELETE =================
    function deleteBooking(vehicleId) {

        if (!confirm("Are you sure?")) return;

        fetch(BASE_URL + "/delete/" + vehicleId, {
            method: "DELETE"
        })
            .then(handleResponse)
            .then(() => {
                alert("Booking deleted!");
                loadBookings();
            })
            .catch(err => alert("Error deleting booking: " + err.message));
    }

</script>

</body>
</html>
