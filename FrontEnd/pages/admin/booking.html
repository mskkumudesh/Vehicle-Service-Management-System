<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f7fa; }
        .card { border-radius: 15px; }
        .table { border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Booking Management</h2>

    <!-- FORM -->
    <div class="card p-4 shadow mb-4">
        <h5>Booking Details</h5>

        <form id="bookingForm">
            <input type="hidden" id="bookingId">

            <div class="row g-3">

                <div class="col-md-3">
                    <input type="text" id="vehicleNumber" class="form-control" placeholder="Vehicle Number" required>
                </div>

                <div class="col-md-3">
                    <input type="date" id="bookingDate" class="form-control" required>
                </div>

                <div class="col-md-3">
                    <input type="time" id="bookingTime" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label>Services</label>
                    <div id="serviceCheckboxes" class="border p-2 rounded"
                         style="max-height:150px; overflow-y:auto;"></div>
                </div>

                <div class="col-md-3">
                    <select id="status" class="form-control">
                        <option value="Pending">PENDING</option>
                        <option value="Confirmed">CONFIRMED</option>
                        <option value="Completed">COMPLETED</option>
                        <option value="Cancelled">CANCELLED</option>
                    </select>
                </div>

            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-primary" >Save</button>
<!--            <button type="button" class="btn btn-warning" onclick="updateBooking()">save</button>-->
                <button type="reset" class="btn btn-secondary">Clear</button>
            </div>
        </form>
    </div>

    <!-- TABLE -->
    <div class="card p-4 shadow">
        <h5>Booking List</h5>

        <table class="table table-striped mt-3">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Vehicle</th>
                <th>Date</th>
                <th>Time</th>
                <th>Services</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody id="bookingTable"></tbody>
        </table>
    </div>

</div>

<script>

    const BASE_URL = "http://localhost:8080/api/v1/booking";

    let servicesList = [];

    window.onload = () => {
        loadServices();
        loadBookings();
    };

    // ================= LOAD SERVICES =================
    function loadServices() {
        fetch("http://localhost:8080/api/v1/service/getAll")
            .then(res => res.json())
            .then(data => {

                let container = document.getElementById("serviceCheckboxes");
                container.innerHTML = "";

                servicesList = data.data;

                data.data.forEach(s => {
                    container.innerHTML += `
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox"
                               value="${s.serviceId}" id="service-${s.serviceId}">
                        <label class="form-check-label">
                            ${s.serviceName}
                        </label>
                    </div>
                `;
                });
            });
    }

    // ================= LOAD BOOKINGS =================
    function loadBookings() {
        fetch(BASE_URL + "/getAll")
            .then(res => res.json())
            .then(data => {

                const table = document.getElementById("bookingTable");
                table.innerHTML = "";

                data.data.forEach(b => {

                    let serviceNames = b.serviceDTOs
                        ? b.serviceDTOs.map(s => s.serviceName).join(", ")
                        : "No Services";

                    table.innerHTML += `
                <tr>
                    <td>${b.bookingId}</td>
                    <td>${b.vehicleNumber}</td>
                    <td>${b.bookingDate}</td>
                    <td>${b.bookingTime}</td>
                    <td>${serviceNames}</td>
                    <td>${b.status}</td>
                    <td>
                        <button class="btn btn-sm btn-info"
                            onclick='selectBooking(
                                "${b.bookingId}",
                                "${b.vehicleNumber}",
                                "${b.bookingDate}",
                                "${b.bookingTime}",
                                ${JSON.stringify(b.serviceDTOs)},
                                "${b.status}"
                            )'>
                            Edit
                        </button>

                        <button class="btn btn-sm btn-danger"
                            onclick="deleteBooking(${b.bookingId})">
                            Delete
                        </button>
                    </td>
                </tr>
                `;
                });

            });
    }

    // ================= SAVE =================
   /*
    document.getElementById("bookingForm").addEventListener("submit", function (e) {
        e.preventDefault();

        let selectedServices = Array.from(
            document.querySelectorAll("#serviceCheckboxes input:checked")
        ).map(cb => ({
            serviceId: parseInt(cb.value)
        }));

        const booking = {
            vehicleNumber: document.getElementById("vehicleNumber").value,
            bookingDate: document.getElementById("bookingDate").value,
            bookingTime: document.getElementById("bookingTime").value,
            serviceDTOs: selectedServices,
            status: document.getElementById("status").value
        };

        fetch(BASE_URL + "/save", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(booking)
        })
            .then(() => {
                alert("Booking saved!");
                loadBookings();
                document.getElementById("bookingForm").reset();
            });
    });
    */

    // ================= SELECT =================
    function selectBooking(id, vehicleNumber, date, time, serviceDTOs, status) {

        document.getElementById("bookingId").value = id;
        document.getElementById("vehicleNumber").value = vehicleNumber;
        document.getElementById("bookingDate").value = date;
        document.getElementById("bookingTime").value = time;
        document.getElementById("status").value = status;

        // clear checkboxes
        document.querySelectorAll("#serviceCheckboxes input").forEach(cb => cb.checked = false);

        // re-check selected
        if (serviceDTOs) {
            serviceDTOs.forEach(s => {
                let cb = document.getElementById("service-" + s.serviceId);
                if (cb) cb.checked = true;
            });
        }
    }

    // ================= UPDATE =================
    document.getElementById("bookingForm").addEventListener("submit", function (e) {
        e.preventDefault();

        let selectedServices = Array.from(
            document.querySelectorAll("#serviceCheckboxes input:checked")
        ).map(cb => ({
            serviceId: parseInt(cb.value)
        }));

        const booking = {
            bookingId: parseInt(document.getElementById("bookingId").value),
            bookingDate: document.getElementById("bookingDate").value,
            bookingTime: document.getElementById("bookingTime").value,
            vehicleNumber:document.getElementById("vehicleNumber").value,
            serviceDTOs: selectedServices,
            status:document.getElementById("status").value
        };

        fetch(`${BASE_URL}/update`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(booking)
        })

            .then(() => {
                alert("✅ Booking Created");
                document.getElementById("bookingForm").reset();
                loadBookings();
            })
            .catch(() => {
                alert(" Booking Failed");
            });
    });
    // ================= DELETE =================
    function deleteBooking(id) {

        if (!confirm("Are you sure?")) return;

        fetch(BASE_URL + "/delete/" + id, {
            method: "DELETE"
        })
            .then(() => {
                alert("Booking deleted!");
                loadBookings();
            });
    }

</script>

</body>
</html>
