<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #343a40;
            color: white;
        }
        .sidebar a {
            color: #ddd;
            text-decoration: none;
            display: block;
            padding: 12px;
        }
        .sidebar a:hover {
            background: #495057;
            color: white;
        }
        .card {
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center">Admin</h4>
            <hr>
            <a href="#">Dashboard</a>
            <a href="/FrontEnd/pages/admin/customer.html" target="_blank">Customers</a>
            <a href="/FrontEnd/pages/admin/vehicle.html" target="_blank">Vehicles</a>
            <a href="/FrontEnd/pages/admin/booking.html" target="_blank">Bookings</a>
            <a href="/FrontEnd/pages/admin/payment.html" target="_blank">Payments</a>
            <a href="/FrontEnd/pages/admin/service.html" target="_blank">Services</a>
            <a href="/FrontEnd/pages/login.html" target="_blank">Logout</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <!-- Navbar -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>Dashboard</h3>
                <button class="btn btn-danger" onclick="window.location.href='/FrontEnd/pages/login.html'" >
                    Logout
                </button>
            </div>

            <!-- Cards -->
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card p-3 text-center shadow-sm">
                        <h5>Total Customers</h5>
                        <h2 id="customerCount">0</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3 text-center shadow-sm">
                        <h5>Total Vehicles</h5>
                        <h2 id="vehicleCount">0</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3 text-center shadow-sm">
                        <h5>Total Bookings</h5>
                        <h2 id="bookingCount">0</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3 text-center shadow-sm">
                        <h5>Total Payments</h5>
                        <h2 id="paymentCount">0</h2>
                    </div>
                </div>
            </div>

            <!-- Recent Bookings Table -->
            <div class="card p-3 shadow-sm">
                <h5>Recent Bookings</h5>
                <table class="table table-striped mt-3">
                    <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Vehicle Number</th>
                        <th>Booking Date</th>
                        <th>Booking Time</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody id="bookingTable">
                    <!-- Data will load here -->
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script>
    async function loadDashboard() {
        const BASE_URL = "http://localhost:8080/api/v1";

        try {
            const customers = await fetch(`${BASE_URL}/user/getAllCustomers`).then(res => res.json());
            const vehicles = await fetch(`${BASE_URL}/vehicle/getAll`).then(res => res.json());
            const bookings = await fetch(`${BASE_URL}/booking/getAll`).then(res => res.json());
            const payments = await fetch(`${BASE_URL}/payment/getAll`).then(res => res.json());
            document.getElementById("customerCount").innerText = customers.data.length;
            document.getElementById("vehicleCount").innerText = vehicles.data.length;
            document.getElementById("bookingCount").innerText = bookings.data.length;
            document.getElementById("paymentCount").innerText = payments.data.length;

            let table = document.getElementById("bookingTable");
            table.innerHTML = "";
            bookings.data.slice(0, 5).forEach(b => {
                table.innerHTML += `
                    <tr>
                        <td>${b.bookingId}</td>
                        <td>${b.vehicleNumber || "N/A"}</td>
                        <td>${b.bookingDate}</td>
                        <td>${b.bookingTime}</td>
                        <td>${b.status}</td>
                    </tr>
                `;
            });

        } catch (e) {
            console.error(e);
            alert("Error loading dashboard data");
        }
    }

    loadDashboard();
</script>

</body>
</html>
