<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            border-radius: 12px;
        }
        .table th {
            background-color: #0d6efd;
            color: white;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <!-- PAYMENT FORM -->
    <div class="card shadow p-4 mb-4">
        <h4 class="mb-3">💳 Complete Payment</h4>

        <form id="paymentForm">
            <div class="row">

                <div class="col-md-3">
                    <label>Booking ID</label>
                    <input type="number" id="bookingId" class="form-control" readonly>
                </div>

                <div class="col-md-3">
                    <label>Date</label>
                    <input type="date" id="paymentDate" class="form-control" required>
                </div>

                <div class="col-md-3">
                    <label>Method</label>
                    <select id="paymentMethod" class="form-control">
                        <option value="CASH">CASH</option>
                        <option value="CARD">CARD</option>
                        <option value="ONLINE">ONLINE</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label>Amount</label>
                    <input type="number" id="amount" class="form-control" readonly>
                </div>

            </div>

            <button type="submit" class="btn btn-success mt-3">Pay Now</button>
            <button type="button" class="btn btn-secondary mt-3" onclick="goBack()">Back</button>
        </form>
    </div>

    <!-- PAYMENT TABLE -->
    <div class="card shadow p-4">
        <h4 class="mb-3 text-center">💰 Payment History</h4>

        <table class="table table-bordered text-center">
            <thead>
            <tr>
                <th>Payment ID</th>
                <th>Date</th>
                <th>Method</th>
                <th>Amount</th>
                <th>Booking ID</th>
            </tr>
            </thead>
            <tbody id="paymentTable"></tbody>
        </table>
    </div>

</div>

<script>
    const BASE_URL = "http://localhost:8080/api/v1/payment";
    const token = localStorage.getItem("token");

    function loadPaymentDetails() {
        const params = new URLSearchParams(window.location.search);

        const bookingId = params.get("bookingId");
        const amount = params.get("amount");

        if (bookingId !== null && amount !== null) {
            document.getElementById("bookingId").value = parseInt(bookingId);
            document.getElementById("amount").value = parseFloat(amount);
        }

        document.getElementById("paymentDate").value =
            new Date().toISOString().split('T')[0];
    }

    // LOAD PAYMENT HISTORY
    function loadPayments() {
        fetch(`${BASE_URL}/getAllByUser`, {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token
            }
        })
            .then(res => res.json())
            .then(data => {

                const table = document.getElementById("paymentTable");
                table.innerHTML = "";

                data.data.forEach(p => {
                    let row = `
                    <tr>
                        <td>${p.paymentId}</td>
                        <td>${p.paymentDate}</td>
                        <td>${p.paymentMethod}</td>
                        <td>${p.amount}</td>
                        <td>${p.bookingId}</td>
                    </tr>
                `;
                    table.innerHTML += row;
                });

            })
            .catch(err => {
                console.error(err);
                alert("Error loading payments");
            });
    }

    // SUBMIT PAYMENT
    document.getElementById("paymentForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const amountValue = document.getElementById("amount").value;

        // VALIDATION
        if (!amountValue || isNaN(amountValue)) {
            alert("❌ Invalid amount!");
            return;
        }

        const payment = {
            paymentDate: document.getElementById("paymentDate").value,
            paymentMethod: document.getElementById("paymentMethod").value,
            amount: parseFloat(amountValue),
            bookingId: parseInt(document.getElementById("bookingId").value)
        };

        fetch(BASE_URL + "/save", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(payment)
        })
            .then(res => {
                if (!res.ok) throw new Error();
                return res.text();
            })
            .then(() => {
                alert("✅ Payment Successful");
                document.getElementById("paymentForm").reset();
                loadPayments();
            })
            .catch(() => {
                alert("❌ Payment Failed");
            });
    });

    function goBack() {
        window.location.href = "customer-booking.html";
    }

    loadPaymentDetails();
    loadPayments();
</script>

</body>
</html>
