<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
    <title>Login</title>

    <style>

        body{
            background:#f3e6d8;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:10px;
            width:300px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            background:#8a4f2d;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#b96130;
        }

        .register-link{
            margin-top:15px;
            display:block;
            font-size:14px;
            color:#8a4f2d;
            text-decoration:none;
        }

        .register-link:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>
<script src="/FrontEnd/js/login.js"></script>

<div class="login-box">

    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <!-- Hyperlink to Register page -->
    <a href="/FrontEnd/pages/register.html" class="register-link">Don't have an account? Register here</a>

</div>
</body>
</html>
