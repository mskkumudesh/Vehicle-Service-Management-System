<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Vehicles</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h3 class="mb-4">My Vehicles</h3>

    <!-- Add Vehicle -->
    <div class="card p-3 mb-3">
        <form id="vehicleForm">
            <div class="row">
                <div class="col">
                    <input type="text" id="vehicleNumber" class="form-control" placeholder="Vehicle Number">
                </div>
                <div class="col">
                    <input type="text" id="brand" class="form-control" placeholder="Brand">
                </div>
                <div class="col">
                    <select id="category" class="form-control">
                        <option>Car</option>
                        <option>Bike</option>
                        <option>Van</option>
                    </select>
                </div>
                <div class="col">
                    <button class="btn btn-primary">Add</button>
                </div>
            </div>
        </form>
    </div>


    <table class="table">
        <thead>
        <tr>
            <th>Number</th>
            <th>Brand</th>
            <th>Category</th>
        </tr>
        </thead>
        <tbody id="vehicleTable"></tbody>
    </table>

</div>

<script>

    const BASE_URL = "http://localhost:8080/api/v1/vehicle";

    const token = localStorage.getItem("token");
    if (!token) {
        alert("Please log in");
        window.location.href="/FrontEnd/index.html";

    }

     loadVehicles();

    function selectVehicle(vehicleNumber,brand,category) {
        document.getElementById("vehicleNumber").value = vehicleNumber;
        document.getElementById("brand").value = brand;
        document.getElementById("category").value = category;
    }
    function clearForm() {
        document.getElementById("vehicleForm").reset();
    }


    function loadVehicles() {
        fetch(BASE_URL + "/getAllByUser", {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token
            }
        })
            .then(res => res.json())
            .then(data => {

                const table = document.getElementById("vehicleTable");
                table.innerHTML = "";

                data.data.forEach(v => {
                    table.innerHTML += `
                <tr>
                    <td>${v.vehicleNumber}</td>
                    <td>${v.brand}</td>
                    <td>${v.category}</td>
                    <th>
                <button class="btn btn-sm btn-info"
                        onclick="selectVehicle('${v.vehicleNumber}','${v.brand}','${v.category}')">
                    Edit
                </button>

                <button class="btn btn-sm btn-danger"
                        onclick="deleteVehicle('${v.vehicleNumber}')">
                    Delete
                </button>
            </th>
                </tr>
                `;
                });

            })
            .catch(err => console.error(err));
    }

    document.getElementById("vehicleForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const vehicle = {
            vehicleNumber: document.getElementById("vehicleNumber").value,
            brand: document.getElementById("brand").value,
            category: document.getElementById("category").value
        };

        fetch(BASE_URL + "/save", {
            method: "POST",
            headers: { "Authorization": "Bearer " + token ,
                "Content-Type": "application/json"},
            body: JSON.stringify(vehicle)
        })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                loadVehicles();
                clearForm();
            });
    });
    function deleteVehicle(vehicleNumber) {

        if (!vehicleNumber) {
            alert("Invalid vehicle number");
            return;
        }

        fetch(`${BASE_URL}/delete/${vehicleNumber}`, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                loadVehicles();
            })
            .catch(err => console.error(err));
    }

</script>

</body>
</html>
