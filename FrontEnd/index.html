<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Service - Home</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }

        .service-card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .service-icon {
            font-size: 40px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">Vehicle Service</a>

        <div class="ms-auto">
            <button class="btn btn-light" onclick="goToLogin()">Login</button>
        </div>
    </div>
</nav>

<!-- Header -->
<div class="container mt-4">
    <h2 class="text-center mb-4">Our Services</h2>

    <!-- Services Grid -->
    <div class="row" id="serviceContainer">
        <!-- Dynamic content will come here -->
    </div>
</div>

<script>
    const BASE_URL = "http://localhost:8080/api/v1/service";

    // Load services when page loads
    window.onload = function () {
        loadServices();
    };

    function loadServices() {
        fetch(BASE_URL+"/getAll")
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById("serviceContainer");
                container.innerHTML = "";

                data.data.forEach(service => {
                    container.innerHTML += `
                        <div class="col-md-4 mb-4">
                            <div class="card service-card p-3 text-center">
                                <div class="service-icon">🔧</div>
                                <h5 class="mt-3">${service.serviceName}</h5>
                                <p>Description</p>
                                <h6 class="text-primary">Rs. ${service.price}</h6>
                                <button class="btn btn-primary mt-2"
                                    onclick="bookService(${service.serviceId})">
                                    Book Now
                                </button>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(error => {
                console.error("Error loading services:", error);
            });
    }

    function bookService(serviceId) {
         alert("login first")
           goToLogin()
    }

    function goToLogin() {
        window.location.href = "/FrontEnd/pages/login.html";
    }
</script>

</body>
</html>
